<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f0f2f5;color:#1a1a2e}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#666}
.loading .spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:#4472c4;border-radius:50%;animation:spin .8s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:22px;font-weight:700;letter-spacing:.5px}
header .updated{font-size:13px;opacity:.7}
.tabs{background:#fff;border-bottom:2px solid #e0e0e0;padding:0 24px;display:flex;gap:0;overflow-x:auto;position:sticky;top:0;z-index:100}
.tab{padding:14px 20px;cursor:pointer;font-size:14px;font-weight:600;color:#666;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.tab:hover{color:#1a1a2e;background:#f8f9fa}
.tab.active{color:#4472c4;border-bottom-color:#4472c4}
.container{max-width:1400px;margin:0 auto;padding:24px}
.section{display:none}
.section.active{display:block}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card .label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card .value{font-size:28px;font-weight:700;color:#1a1a2e}
.card .sub{font-size:13px;color:#888;margin-top:4px}
.card.highlight{background:linear-gradient(135deg,#4472c4,#2d5aa0);color:#fff}
.card.highlight .label{color:rgba(255,255,255,.8)}
.card.highlight .value{color:#fff}
.card.highlight .sub{color:rgba(255,255,255,.7)}
.card.warn{border-left:4px solid #ed7d31}
.card.good{border-left:4px solid #2ecc71}

/* Charts */
.chart-wrap{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:24px}
.chart-wrap h3{font-size:16px;font-weight:700;margin-bottom:16px;color:#1a1a2e}
.chart-container{position:relative;width:100%;height:320px}

/* Tables */
.tbl-wrap{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:24px;overflow-x:auto}
.tbl-wrap h3{font-size:16px;font-weight:700;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f0f2f5;padding:10px 12px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #ddd;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #eee}
tr:hover td{background:#f8f9fb}
.num{text-align:right;font-variant-numeric:tabular-nums}
.bar-cell{position:relative}
.bar-bg{position:absolute;left:0;top:0;bottom:0;background:#e8f0fe;border-radius:2px;z-index:0}
.bar-cell span{position:relative;z-index:1}

/* Progress */
.progress-bar{height:24px;background:#e0e0e0;border-radius:12px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#4472c4,#2ecc71);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;min-width:40px;transition:width .6s}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  データを読み込み中...
</div>

<div id="app" style="display:none">
<header>
  <h1>楽天ダッシュボード</h1>
  <div class="updated" id="updatedAt"></div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="sales">月次売上推移</div>
  <div class="tab" data-tab="kpi">商品KPI</div>
  <div class="tab" data-tab="forecast">着地予測</div>
  <div class="tab" data-tab="ads">広告パフォーマンス</div>
  <div class="tab" data-tab="basket">バスケット分析</div>
  <div class="tab" data-tab="f2">F2分析</div>
</div>

<div class="container">

<!-- 1. 月次売上推移 -->
<div class="section active" id="sec-sales">
  <div class="cards" id="sales-cards"></div>
  <div class="chart-wrap"><h3>月次売上推移</h3><div class="chart-container"><canvas id="chart-monthly-sales"></canvas></div></div>
  <div class="chart-wrap"><h3>商品別売上推移 (TOP10)</h3><div class="chart-container"><canvas id="chart-product-sales"></canvas></div></div>
  <div class="tbl-wrap"><h3>月次サマリ</h3><table id="tbl-monthly"></table></div>
</div>

<!-- 2. 商品KPI -->
<div class="section" id="sec-kpi">
  <div class="tbl-wrap"><h3>商品別KPI (TOP50)</h3><table id="tbl-kpi"></table></div>
</div>

<!-- 3. 着地予測 -->
<div class="section" id="sec-forecast">
  <div class="cards" id="forecast-cards"></div>
  <div class="chart-wrap"><h3>当月 日次売上推移</h3><div class="chart-container"><canvas id="chart-daily-sales"></canvas></div></div>
</div>

<!-- 4. 広告パフォーマンス -->
<div class="section" id="sec-ads">
  <div class="cards" id="ads-cards"></div>
  <div class="chart-wrap"><h3>日次 広告費 vs 売上</h3><div class="chart-container"><canvas id="chart-daily-ads"></canvas></div></div>
  <div class="chart-wrap"><h3>日次 ROAS推移</h3><div class="chart-container"><canvas id="chart-daily-roas"></canvas></div></div>
  <div class="tbl-wrap"><h3>商品別広告パフォーマンス</h3><table id="tbl-ad-products"></table></div>
</div>

<!-- 5. バスケット分析 -->
<div class="section" id="sec-basket">
  <div class="cards" id="basket-cards"></div>
  <div class="chart-wrap"><h3>注文あたり商品種類数 分布</h3><div class="chart-container"><canvas id="chart-basket-size"></canvas></div></div>
  <div class="tbl-wrap"><h3>同時購入ペア TOP20</h3><table id="tbl-pairs"></table></div>
</div>

<!-- 6. F2分析 -->
<div class="section" id="sec-f2">
  <div class="cards" id="f2-cards"></div>
  <div class="chart-wrap"><h3>購入回数別 顧客分布</h3><div class="chart-container"><canvas id="chart-f-dist"></canvas></div></div>
  <div class="chart-wrap"><h3>月別 新規 vs リピート</h3><div class="chart-container"><canvas id="chart-nr"></canvas></div></div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
const fmt = n => n == null ? '-' : n.toLocaleString('ja-JP');
const pct = n => n == null ? '-' : n + '%';

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('sec-' + tab.dataset.tab).classList.add('active');
  });
});

function cardHTML(label, value, sub, cls) {
  return '<div class="card ' + (cls||'') + '"><div class="label">' + label + '</div><div class="value">' + value + '</div>' + (sub ? '<div class="sub">' + sub + '</div>' : '') + '</div>';
}

google.script.run.withSuccessHandler(render).withFailureHandler(err => {
  document.getElementById('loading').innerHTML = '<span style="color:red">エラー: ' + err.message + '</span>';
}).getDashboardData();

function render(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = '';
  document.getElementById('updatedAt').textContent = '更新: ' + new Date().toLocaleString('ja-JP');

  renderSales(d.monthlySales);
  renderKPI(d.productKPI);
  renderForecast(d.forecast);
  renderAds(d.adPerformance);
  renderBasket(d.basket);
  renderF2(d.f2);
}

// --- 1. 月次売上 ---
function renderSales(data) {
  const s = data.summary;
  const last = s[s.length - 1] || {};
  const prev = s[s.length - 2] || {};
  const totalSales = s.reduce((a, r) => a + r.sales, 0);
  const mom = prev.sales > 0 ? Math.round((last.sales - prev.sales) / prev.sales * 100) : 0;

  document.getElementById('sales-cards').innerHTML =
    cardHTML('累計売上', '¥' + fmt(totalSales), s.length + 'ヶ月分', 'highlight') +
    cardHTML('直近月売上', '¥' + fmt(last.sales), last.month || '') +
    cardHTML('前月比', (mom >= 0 ? '+' : '') + mom + '%', '', mom >= 0 ? 'good' : 'warn') +
    cardHTML('直近月注文数', fmt(last.orders), '客単価 ¥' + fmt(last.aov));

  new Chart(document.getElementById('chart-monthly-sales'), {
    type: 'bar',
    data: {
      labels: data.months,
      datasets: [{
        label: '売上',
        data: s.map(r => r.sales),
        backgroundColor: '#4472c4',
        borderRadius: 4,
      }, {
        label: '注文数',
        data: s.map(r => r.orders),
        type: 'line',
        borderColor: '#ed7d31',
        backgroundColor: 'transparent',
        yAxisID: 'y1',
        tension: .3,
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, ticks: { callback: v => '¥' + (v/10000).toFixed(0) + '万' } },
        y1: { position: 'right', beginAtZero: true, grid: { display: false } },
      },
    },
  });

  const colors = ['#4472c4','#ed7d31','#a5a5a5','#ffc000','#5b9bd5','#70ad47','#264478','#9b59b6','#e74c3c','#1abc9c'];
  new Chart(document.getElementById('chart-product-sales'), {
    type: 'line',
    data: {
      labels: data.months,
      datasets: data.productSeries.map((ps, i) => ({
        label: ps.name.substring(0, 20),
        data: ps.data,
        borderColor: colors[i % colors.length],
        backgroundColor: 'transparent',
        tension: .3,
        pointRadius: 3,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
      scales: { y: { beginAtZero: true, ticks: { callback: v => '¥' + (v/10000).toFixed(0) + '万' } } },
    },
  });

  let html = '<tr><th>月</th><th class="num">売上</th><th class="num">注文数</th><th class="num">商品数</th><th class="num">客単価</th></tr>';
  s.slice().reverse().forEach(r => {
    html += '<tr><td>' + r.month + '</td><td class="num">¥' + fmt(r.sales) + '</td><td class="num">' + fmt(r.orders) + '</td><td class="num">' + fmt(r.items) + '</td><td class="num">¥' + fmt(r.aov) + '</td></tr>';
  });
  document.getElementById('tbl-monthly').innerHTML = html;
}

// --- 2. 商品KPI ---
function renderKPI(data) {
  const maxSales = Math.max(...data.map(r => r.sales), 1);
  let html = '<tr><th>商品名</th><th class="num">売上</th><th class="num">注文数</th><th class="num">客単価</th><th class="num">RPPクリック</th><th class="num">RPP広告費</th><th class="num">ROAS</th><th class="num">CVR</th></tr>';
  data.forEach(r => {
    const w = Math.round(r.sales / maxSales * 100);
    html += '<tr><td title="' + r.id + '">' + r.name + '</td><td class="num bar-cell"><div class="bar-bg" style="width:' + w + '%"></div><span>¥' + fmt(r.sales) + '</span></td><td class="num">' + fmt(r.orders) + '</td><td class="num">¥' + fmt(r.aov) + '</td><td class="num">' + fmt(r.rppClicks) + '</td><td class="num">¥' + fmt(r.rppSpend) + '</td><td class="num">' + pct(r.roas) + '</td><td class="num">' + pct(r.cvr) + '</td></tr>';
  });
  document.getElementById('tbl-kpi').innerHTML = html;
}

// --- 3. 着地予測 ---
function renderForecast(data) {
  const rate = data.achieveRate;
  document.getElementById('forecast-cards').innerHTML =
    cardHTML(data.monthLabel + ' 実績', '¥' + fmt(data.currentSales), data.today + '/' + data.daysInMonth + '日経過', 'highlight') +
    cardHTML('着地予測', '¥' + fmt(data.forecastSales), '日次平均 ¥' + fmt(data.dailyAvg)) +
    cardHTML('前月実績', '¥' + fmt(data.lastMonthSales), fmt(data.lastMonthOrders) + '件') +
    cardHTML('前月比達成率', pct(rate), '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(rate, 100) + '%">' + rate + '%</div></div>', rate >= 100 ? 'good' : 'warn');

  const daily = data.daily;
  new Chart(document.getElementById('chart-daily-sales'), {
    type: 'bar',
    data: {
      labels: daily.map(d => d.day + '日'),
      datasets: [{
        label: '日次売上',
        data: daily.map(d => d.sales),
        backgroundColor: '#4472c4',
        borderRadius: 3,
      }, {
        label: '累計売上',
        data: daily.map(d => d.cumulative),
        type: 'line',
        borderColor: '#ed7d31',
        backgroundColor: 'transparent',
        yAxisID: 'y1',
        tension: .3,
        pointRadius: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, ticks: { callback: v => '¥' + (v/10000).toFixed(0) + '万' } },
        y1: { position: 'right', beginAtZero: true, grid: { display: false }, ticks: { callback: v => '¥' + (v/10000).toFixed(0) + '万' } },
      },
    },
  });
}

// --- 4. 広告 ---
function renderAds(data) {
  const s = data.summary;
  document.getElementById('ads-cards').innerHTML =
    cardHTML('ROAS', pct(s.roas), '', s.roas >= 300 ? 'good' : s.roas >= 100 ? '' : 'warn') +
    cardHTML('広告費合計', '¥' + fmt(s.spend), '') +
    cardHTML('広告経由売上', '¥' + fmt(s.sales), '', 'highlight') +
    cardHTML('CVR', pct(s.cvr), '') +
    cardHTML('CPC', '¥' + fmt(s.cpc), '') +
    cardHTML('CPA', '¥' + fmt(s.cpa), '');

  const daily = data.daily;
  new Chart(document.getElementById('chart-daily-ads'), {
    type: 'bar',
    data: {
      labels: daily.map(d => d.date),
      datasets: [{
        label: '広告費',
        data: daily.map(d => d.spend),
        backgroundColor: '#e74c3c88',
        borderRadius: 3,
      }, {
        label: '売上',
        data: daily.map(d => d.sales),
        backgroundColor: '#4472c488',
        borderRadius: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { beginAtZero: true, ticks: { callback: v => '¥' + (v/1000).toFixed(0) + 'k' } } },
    },
  });

  new Chart(document.getElementById('chart-daily-roas'), {
    type: 'line',
    data: {
      labels: daily.map(d => d.date),
      datasets: [{
        label: 'ROAS(%)',
        data: daily.map(d => d.roas),
        borderColor: '#2ecc71',
        backgroundColor: 'rgba(46,204,113,.1)',
        fill: true,
        tension: .3,
        pointRadius: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { beginAtZero: true } },
      plugins: { annotation: { annotations: { line1: { type: 'line', yMin: 100, yMax: 100, borderColor: '#e74c3c', borderDash: [5,5] } } } },
    },
  });

  let html = '<tr><th>商品ID</th><th class="num">クリック数</th><th class="num">広告費</th><th class="num">売上</th><th class="num">注文数</th><th class="num">ROAS</th><th class="num">CVR</th><th class="num">CPC</th></tr>';
  data.products.forEach(r => {
    html += '<tr><td>' + r.id + '</td><td class="num">' + fmt(r.clicks) + '</td><td class="num">¥' + fmt(r.spend) + '</td><td class="num">¥' + fmt(r.sales) + '</td><td class="num">' + fmt(r.orders) + '</td><td class="num">' + pct(r.roas) + '</td><td class="num">' + pct(r.cvr) + '</td><td class="num">¥' + fmt(r.cpc) + '</td></tr>';
  });
  document.getElementById('tbl-ad-products').innerHTML = html;
}

// --- 5. バスケット ---
function renderBasket(data) {
  const multiRate = data.sizeDistribution.filter(s => s.size >= 2).reduce((a, s) => a + s.count, 0);
  const multiPct = data.totalOrders > 0 ? Math.round(multiRate / data.totalOrders * 100) : 0;
  document.getElementById('basket-cards').innerHTML =
    cardHTML('総注文数', fmt(data.totalOrders), '') +
    cardHTML('2商品以上', fmt(multiRate) + '件', multiPct + '%の注文', 'highlight') +
    cardHTML('同時購入ペア数', fmt(data.pairs.length), 'TOP20表示');

  new Chart(document.getElementById('chart-basket-size'), {
    type: 'bar',
    data: {
      labels: data.sizeDistribution.map(s => s.size + '種類'),
      datasets: [{ label: '注文数', data: data.sizeDistribution.map(s => s.count), backgroundColor: '#5b9bd5', borderRadius: 4 }]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } },
  });

  let html = '<tr><th>商品A</th><th>商品B</th><th class="num">同時購入数</th><th class="num">リフト値</th></tr>';
  data.pairs.forEach(p => {
    const liftCls = p.lift >= 3 ? 'style="color:#2ecc71;font-weight:700"' : p.lift >= 1.5 ? 'style="color:#f39c12"' : '';
    html += '<tr><td>' + p.productA + '</td><td>' + p.productB + '</td><td class="num">' + fmt(p.count) + '</td><td class="num" ' + liftCls + '>' + p.lift.toFixed(2) + '</td></tr>';
  });
  document.getElementById('tbl-pairs').innerHTML = html;
}

// --- 6. F2 ---
function renderF2(data) {
  document.getElementById('f2-cards').innerHTML =
    cardHTML('総顧客数', fmt(data.totalCustomers), '') +
    cardHTML('F1 (1回のみ)', fmt(data.f1), '') +
    cardHTML('F2+ (リピーター)', fmt(data.f2plus), '', 'highlight') +
    cardHTML('リピート率', pct(data.f2Rate), '', data.f2Rate >= 30 ? 'good' : 'warn');

  new Chart(document.getElementById('chart-f-dist'), {
    type: 'bar',
    data: {
      labels: data.distribution.map(d => 'F' + d.f),
      datasets: [{
        label: '顧客数',
        data: data.distribution.map(d => d.count),
        backgroundColor: data.distribution.map((d, i) => i === 0 ? '#a5a5a5' : '#4472c4'),
        borderRadius: 4,
      }]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } },
  });

  new Chart(document.getElementById('chart-nr'), {
    type: 'bar',
    data: {
      labels: data.monthlyData.map(d => d.month),
      datasets: [{
        label: '新規',
        data: data.monthlyData.map(d => d.newCount),
        backgroundColor: '#5b9bd5',
        borderRadius: 3,
      }, {
        label: 'リピート',
        data: data.monthlyData.map(d => d.repeatCount),
        backgroundColor: '#ed7d31',
        borderRadius: 3,
      }, {
        label: 'リピート率(%)',
        data: data.monthlyData.map(d => d.repeatRate),
        type: 'line',
        borderColor: '#2ecc71',
        backgroundColor: 'transparent',
        yAxisID: 'y1',
        tension: .3,
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { stacked: true },
        y: { stacked: true, beginAtZero: true },
        y1: { position: 'right', beginAtZero: true, max: 100, grid: { display: false } },
      },
    },
  });
}
</script>
</body>
</html>
