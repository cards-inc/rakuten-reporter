<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楽天市場アナリティクス</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif; background:#f5f6fa; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.header { text-align:center; margin-bottom:40px; }
.header img { height:48px; margin-bottom:12px; }
.header h1 { font-size:22px; color:#1a3a5c; letter-spacing:1.5px; text-transform:uppercase; }
.cards { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
.card { background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:32px 40px; text-align:center; text-decoration:none; color:#1a3a5c; transition:transform 0.15s,box-shadow 0.15s; min-width:220px; }
.card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,0.12); }
.card .shop-name { font-size:20px; font-weight:700; margin-bottom:8px; }
.card .shop-id { font-size:13px; color:#888; }
.card .status { font-size:12px; margin-top:12px; padding:4px 12px; border-radius:20px; display:inline-block; }
.card .status.active { background:#e8f5e9; color:#2e7d32; }
.card .status.pending { background:#fff3e0; color:#e65100; }
</style>
</head>
<body>
<div class="header">
<img src="cards_logo.png" alt="logo">
<h1>楽天市場アナリティクス</h1>
</div>
<div class="cards">
<a class="card" href="nagara-shop/">
<div class="shop-name">百福堂</div>
<div class="shop-id">nagara-shop</div>
<div class="status active">Active</div>
</a>
</div>
</body>
</html>
